name: cabidl
about: Parse and validate CABIDL architecture specification files
args:
  - version:
      short: V
      long: version
      help: Print version information (-V for short version, --version includes spec version)
      takes_value: false
subcommands:
  - read:
      about: Resolve includes and output a single unified CABIDL document
      args:
        - file:
            help: Path to the CABIDL markdown file
            required: true
            index: 1
  - validate:
      about: Validate a CABIDL document (silent on success, errors on failure)
      args:
        - file:
            help: Path to the CABIDL markdown file
            required: true
            index: 1
  - diagram:
      about: Generate an architecture diagram from a CABIDL document
      args:
        - file:
            help: Path to the CABIDL markdown file
            required: true
            index: 1
        - type:
            short: t
            long: type
            help: Diagram output format
            default_value: graphviz
            possible_values:
              - graphviz
        - output-file:
            short: o
            long: output-file
            help: Path to the output file
            required: true
  - skill:
      about: Manage cabidl skills for AI tool providers
      subcommands:
        - install:
            about: Install the cabidl skill to an AI tool provider
            args:
              - target-dir:
                  short: d
                  long: target-dir
                  help: Target directory for skill installation (defaults to provider's default location)
                  takes_value: true
                  required: false
  - init:
      about: Initialize a new CABIDL project from a template
      args:
        - dir:
            short: d
            long: dir
            help: Target directory (defaults to current directory)
            takes_value: true
            required: false
        - provider:
            short: p
            long: provider
            help: AI tool provider for project setup (e.g. claude-code)
            takes_value: true
            default_value: claude-code
            required: false
        - template:
            short: t
            long: template
            help: Template name (omit to list available templates)
            takes_value: true
            required: false
