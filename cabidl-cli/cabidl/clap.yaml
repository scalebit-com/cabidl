name: cabidl
about: Parse and validate CABIDL architecture specification files
args:
  - version:
      short: V
      long: version
      help: Print version information (-V for short version, --version includes spec version)
      takes_value: false
  - file:
      help: Path to the CABIDL markdown file
      required: true
      index: 1
subcommands:
  - read:
      about: Resolve includes and output a single unified CABIDL document
      args:
        - file:
            help: Path to the CABIDL markdown file
            required: true
            index: 1
  - validate:
      about: Validate a CABIDL document (silent on success, errors on failure)
      args:
        - file:
            help: Path to the CABIDL markdown file
            required: true
            index: 1
  - diagram:
      about: Generate an architecture diagram from a CABIDL document
      args:
        - file:
            help: Path to the CABIDL markdown file
            required: true
            index: 1
        - type:
            short: t
            long: type
            help: Diagram output format
            default_value: graphviz
            possible_values:
              - graphviz
        - output-file:
            short: o
            long: output-file
            help: Path to the output file
            required: true
